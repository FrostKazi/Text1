</style> <div id="pdf-container"> <a class="pdf-download-btn" href="/Text1/assets/pdf/resume.pdf" download=""> <i class="fas fa-download"></i> Download PDF </a> <div class="pdf-controls"> <button id="pdf-prev">← Prev</button> <span>Page <span id="pdf-page-num">1</span> of <span id="pdf-page-count">—</span></span> <button id="pdf-next">Next →</button> </div> <canvas id="pdf-canvas"></canvas> <div id="pdf-error"> PDF not found. Upload your resume to <code>assets/pdf/resume.pdf</code> and commit. </div> </div> <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" integrity="sha512-q+4lAudCFBdaLcVHkMkVhBQBXJuVnMH0JnPWxjHCJQwWIrLn0A8T5S3cbBMm9EhEPmMHPtUIjwRFVOYwq5NQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script> <script>
(function(){
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const pdfUrl      = '/Text1/assets/pdf/resume.pdf';
  const canvas      = document.getElementById('pdf-canvas');
  const ctx         = canvas.getContext('2d');
  const pageNumEl   = document.getElementById('pdf-page-num');
  const pageCountEl = document.getElementById('pdf-page-count');
  const errEl       = document.getElementById('pdf-error');

  let pdfDoc = null, currentPage = 1;

  function renderPage(num) {
    pdfDoc.getPage(num).then(function(page){
      var containerW = canvas.parentElement.clientWidth || 800;
      var vp0 = page.getViewport({ scale: 1 });
      var scale = containerW / vp0.width;
      var vp = page.getViewport({ scale: scale });
      canvas.height = vp.height;
      canvas.width  = vp.width;
      page.render({ canvasContext: ctx, viewport: vp });
      pageNumEl.textContent = num;
    });
  }

  pdfjsLib.getDocument(pdfUrl).promise.then(function(pdf){
    pdfDoc = pdf;
    pageCountEl.textContent = pdf.numPages;
    renderPage(1);
  }).catch(function(){
    errEl.style.display = 'block';
    canvas.style.display = 'none';
  });

  document.getElementById('pdf-prev').addEventListener('click', function(){
    if(currentPage > 1){ currentPage--; renderPage(currentPage); }
  });
  document.getElementById('pdf-next').addEventListener('click', function(){
    if(pdfDoc && currentPage < pdfDoc.numPages){ currentPage++; renderPage(currentPage); }
  });

  var resizeT;
  window.addEventListener('resize', function(){
    clearTimeout(resizeT);
    resizeT = setTimeout(function(){ if(pdfDoc) renderPage(currentPage); }, 200);
  });
}());
